<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>YULIIA&amp;MAX — Міжнародний бізнес у сфері здоров'я та краси</title>
<meta name="description" content="YULIIA&MAX — Міжнародний бізнес у сфері здоров'я та краси. ТОП-2 Іспанія, 45 264 партнерів у структурі." />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0d030a; overflow: hidden; }
  #view { display: block; width: 100vw; height: 100dvh; height: 100vh; border: 0; }
  @supports (height: 100dvh) { #view { height: 100dvh; } }
</style>
</head>
<body>
<iframe id="view" title="YULIIA&amp;MAX" frameborder="0" allow="autoplay; encrypted-media"></iframe>
<script>
  (function () {
    var frame = document.getElementById('view');
    var mq = window.matchMedia('(min-width: 880px)');
    function pick() {
      var target = mq.matches ? 'desktop.html' : 'mobile.html';
      target += location.search + location.hash;
      var current = frame.getAttribute('src') || '';
      if (current.split('?')[0].split('#')[0] !== target.split('?')[0].split('#')[0]) {
        frame.src = target;
      }
    }
    pick();
    if (mq.addEventListener) mq.addEventListener('change', pick);
    else if (mq.addListener) mq.addListener(pick);
  })();
</script>
</body>
</html>
